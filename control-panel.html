<div id="control-panel" class="collapsed">

  <!-- TOP-LEVEL TUNE TOGGLE -->
  <div id="panel-tune-header">
    <span class="section-title">tune</span>
    <span id="panel-tune-toggle" class="collapsible-toggle"></span>
  </div>

  <div id="panel-body">

  <!-- CURSOR MODE TOGGLE -->
  <div class="panel-section">
    <div class="title-with-toggle">
      <div class="section-title"></div>
      <div id="cursor-mode-slider" class="three-way-toggle">
        <div class="three-way-track">
          <div class="three-way-pill" id="cursor-mode-pill"></div>
        </div>
        <div class="three-way-labels">
          <span data-mode="herd">herd</span>
          <span data-mode="shepherd">shepherd</span>
          <span data-mode="target">target</span>
        </div>
      </div>
    </div>
  </div>

  <!-- SHOW RADII TOGGLE -->

  <!-- SIZES SECTION -->
  <div class="panel-section">
    <div class="collapsible-header" data-toggle="sizes-content">
      <div class="section-title">size</div>
      <div class="collapsible-toggle" id="sizes-toggle"></div>
    </div>

    <div id="sizes-content" class="collapsible-content">
    <div style="margin-bottom: 6px;">
      <div class="input-row-flex">
        <span class="label-lowercase">herd</span>
        <input id="herd-size-input" type="number" min="3" max="50" class="number-input">
      </div>
    </div>

    <div>
      <div class="input-row-flex">
        <span class="label-lowercase">shepherds</span>
        <input id="shepherds-count-input" type="number" min="1" max="30" class="number-input">
      </div>
    </div>
    </div>
  </div>

  <!-- ======================= -->
  <!-- HERD PARAMETERS SECTION -->
  <!-- ======================= -->

  <div class="panel-section">
    <div class="collapsible-header" data-toggle="herd-content">
      <div class="section-title">herd</div>
      <div class="collapsible-toggle" id="herd-toggle"></div>
    </div>
    
    <div id="herd-content" class="collapsible-content">
    <!-- Herd Force Controls -->
    <div style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px;">
      <div class="slider-group">
        <div class="slider-row">
          <span class="slider-label">repulsion</span>
          <input id="herd-a-r" type="range">
          <span id="herd-a-r-value" class="slider-value"></span>
        </div>
      </div>
      <div class="slider-group">
        <div class="slider-row">
          <span class="slider-label">orientation</span>
          <input id="herd-a-o" type="range">
          <span id="herd-a-o-value" class="slider-value"></span>
        </div>
      </div>
      <div class="slider-group">
        <div class="slider-row">
          <span class="slider-label">attraction</span>
          <input id="herd-a-a" type="range">
          <span id="herd-a-a-value" class="slider-value"></span>
        </div>
      </div>
      <div class="slider-group">
        <div class="slider-row">
          <span class="slider-label">interaction</span>
          <input id="herd-a-i" type="range">
          <span id="herd-a-i-value" class="slider-value"></span>
        </div>
      </div>
    </div>

    <!-- Laziness -->
    <div class="section-divider">
      <div class="slider-row">
        <span class="slider-label">drag</span>
        <input id="herd-a-v" type="range">
        <span id="herd-a-v-value" class="slider-value"></span>
      </div>
    </div>
    </div>
  </div>

  <!-- ============================ -->
  <!-- SHEPHERD PARAMETERS SECTION -->
  <!-- ============================ -->
   
  <div class="panel-section">
    <div class="collapsible-header" data-toggle="shepherd-content">
      <div class="section-title">shepherds</div>
      <div class="collapsible-toggle" id="shepherd-toggle"></div>
    </div>

    <div id="shepherd-content" class="collapsible-content">
    <!-- Display shepherding radius value -->
    <!-- 
    <div class="info-box clearfix">
      <span class="info-box-label">shepherding radius (depends on attraction radius):</span>

    </div>
    -->

    <!-- Forces Section -->
    <div style="margin-bottom: 8px;">
      <!-- <div class="slider-group-title" style="margin-bottom: 4px;">forces</div>-->
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <div class="slider-group">
          <div class="slider-row">
            <span class="slider-label">navigation</span>
            <input id="shep-a-n" type="range">
            <span id="shep-a-n-value" class="slider-value"></span>
          </div>
        </div>

        <div class="slider-group">
          <div class="slider-row">
            <span class="slider-label">repulsion</span>
            <input id="shep-a-r-s" type="range">
            <span id="shep-a-r-s-value" class="slider-value"></span>
          </div>
        </div>
      </div>
    </div>

    <!-- Laziness -->

    <div class="slider-group">
      <div class="slider-group-title">laziness</div>
      <div class="slider-row">
        <span style="flex-shrink: 0; font-size: 8px; color: rgba(0,0,0,0.5);"></span>
        <input id="shep-a-v-s" type="range" min="0" max="5" step="0.1" value="3">
        <span id="shep-a-v-s-value" class="slider-value">3.0</span>
      </div>
    </div>
    </div>
  </div>

    <!-- Laziness -->
    <div class="section-divider">
      <div class="slider-row">
        <span class="slider-label">drag</span>
        <input id="shep-a-v-s" type="range" min="0" max="5" step="0.1" value="3">
        <span id="shep-a-v-s-value" class="slider-value">3.0</span>
      </div>
    </div>
    </div>
  </div>

  </div><!-- /#panel-body -->

</div>
